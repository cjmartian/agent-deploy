<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; color: #eee; }
  .container { text-align: center; }
  h1 { margin-bottom: 0.5em; font-size: 2em; }
  #status { font-size: 1.3em; margin-bottom: 1em; min-height: 1.6em; }
  .board { display: inline-grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 6px; background: #16213e; padding: 6px; border-radius: 10px; }
  .cell { width: 100px; height: 100px; background: #0f3460; border: none; border-radius: 6px; font-size: 2.5em; font-weight: bold; color: #eee; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
  .cell:hover { background: #1a4a7a; }
  .cell.x { color: #e94560; }
  .cell.o { color: #0cc0df; }
  .cell.disabled { cursor: default; }
  .cell.disabled:hover { background: #0f3460; }
  #resetBtn { margin-top: 1.2em; padding: 0.6em 2em; font-size: 1em; background: #e94560; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  #resetBtn:hover { background: #c73652; }
</style>
</head>
<body>
<div class="container">
  <h1>Tic-Tac-Toe</h1>
  <div id="status">Loading...</div>
  <div class="board" id="board"></div>
  <button id="resetBtn" onclick="resetGame()">New Game</button>
</div>
<script>
  const board = document.getElementById("board");
  const status = document.getElementById("status");

  function render(state) {
    board.innerHTML = "";
    const over = state.winner || state.draw;
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const cell = document.createElement("button");
        cell.className = "cell";
        const v = state.board[r][c];
        cell.textContent = v;
        if (v === "X") cell.classList.add("x");
        if (v === "O") cell.classList.add("o");
        if (v || over) cell.classList.add("disabled");
        if (!v && !over) cell.addEventListener("click", () => makeMove(r, c));
        board.appendChild(cell);
      }
    }
    if (state.winner) {
      status.textContent = "Player " + state.winner + " wins!";
    } else if (state.draw) {
      status.textContent = "It's a draw!";
    } else {
      status.textContent = "Player " + state.turn + "'s turn";
    }
  }

  async function fetchState() {
    const res = await fetch("/state");
    render(await res.json());
  }

  async function makeMove(row, col) {
    const res = await fetch("/move", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({row, col})
    });
    render(await res.json());
  }

  async function resetGame() {
    const res = await fetch("/reset", {method: "POST"});
    render(await res.json());
  }

  fetchState();
</script>
</body>
</html>
